name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: files_pdfviewer
  PHP_VERSIONS: '["8.3"]'

jobs:
  get-vars:
    runs-on: ubuntu-latest
    outputs:
      app-name: ${{ env.APP_NAME }}
      php-versions: ${{ env.PHP_VERSIONS }}
    steps:
      - name: Set variables
        run: |
          echo "App name $APP_NAME"
          echo "PHP versions string: $PHP_VERSIONS"

  semantic-git-messages:
    name: Commits
    uses: owncloud/reusable-workflows/.github/workflows/semantic-git-message.yml@main

  php-code-style:
    name: PHP Code Style
    needs:
      - get-vars
    uses: owncloud/reusable-workflows/.github/workflows/php-codestyle.yml@main
    with:
      app-name: ${{ needs.get-vars.outputs.app-name }}
      php-versions: ${{ needs.get-vars.outputs.php-versions }}

  php-unit:
    name: PHP Unit
    needs:
      - get-vars
    uses: owncloud/reusable-workflows/.github/workflows/php-unit.yml@main
    with:
      app-name: ${{ needs.get-vars.outputs.app-name }}
      php-versions: ${{ needs.get-vars.outputs.php-versions }}

  security:
    name: Security regression checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - name: Run CVE regression checks
        run: make test-security
